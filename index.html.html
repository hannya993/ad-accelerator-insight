<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A&D Accelerator Insight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --bg:       #04080f;
  --s1:       #080f1a;
  --s2:       #0b1526;
  --border:   #132035;
  --border2:  #1e3050;
  --cyan:     #00d4ff;
  --amber:    #ffc947;
  --orange:   #ff6b35;
  --green:    #7fff6b;
  --purple:   #c77dff;
  --red:      #ff4d6d;
  --sky:      #48cae4;
  --peach:    #f4a261;
  --text:     #ddeeff;
  --muted:    #3d6080;
  --muted2:   #224060;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ── */
header {
  height:52px;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 20px;
  gap:16px;
  position:relative;
  z-index:1000;
  flex-shrink:0;
  width:100%;
}
.logo-mark {
  width:28px;height:28px;flex-shrink:0;
  background:var(--cyan);
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  animation:pulse-star 3s ease-in-out infinite;
}
@keyframes pulse-star{0%,100%{opacity:1}50%{opacity:.6}}
.title-block{display:flex;align-items:baseline;gap:10px;}
.app-title{font-family:'Barlow',sans-serif;font-weight:800;font-size:17px;letter-spacing:.04em;color:var(--text);white-space:nowrap;}
.app-title span{color:var(--cyan);}

/* accelerator dropdown */
.acc-select-wrap{position:relative;margin-left:2px;}
.acc-select{
  appearance:none;
  background:var(--s2);
  border:1px solid var(--border2);
  border-radius:5px;
  color:var(--cyan);
  font-family:'Space Mono',monospace;
  font-size:11px;
  padding:5px 28px 5px 10px;
  cursor:pointer;
  outline:none;
  transition:border-color .2s;
}
.acc-select:hover{border-color:var(--cyan);}
.acc-arrow{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--cyan);font-size:10px;
}

/* breadcrumb */
.breadcrumb{
  flex:1;display:flex;align-items:center;gap:6px;
  font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);
  justify-content:center;
}
.bc-crumb{color:var(--cyan);cursor:pointer;transition:opacity .2s;}
.bc-crumb:hover{opacity:.65;}
.bc-sep{color:var(--border2);}
.bc-current{color:var(--text);}

/* header stats */
.hstats{display:flex;gap:24px;flex-shrink:0;}
.hstat{text-align:center;}
.hstat-num{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--cyan);line-height:1;}
.hstat-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-top:2px;}

/* ── BODY ── */
.body{display:flex;flex:1;overflow:hidden;}

/* ── MAP ── */
#map{flex:1;background:var(--bg);}
.leaflet-container{background:#04080f!important;}
.leaflet-tile-pane{filter:saturate(0.4) brightness(0.75);}

/* map zoom hint */
.map-hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(8,15,26,.85);border:1px solid var(--border2);
  border-radius:4px;padding:6px 14px;
  font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
  pointer-events:none;z-index:500;white-space:nowrap;
  transition:opacity .4s;
}

/* ── SIDEBAR ── */
.sidebar{
  width:320px;flex-shrink:0;
  background:var(--s1);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-inner{flex:1;overflow-y:auto;padding:16px;}
.sidebar-inner::-webkit-scrollbar{width:3px;}
.sidebar-inner::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.sidebar-empty{
  height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:var(--muted);text-align:center;padding:24px;
}
.sidebar-empty .empty-icon{font-size:32px;opacity:.3;}
.sidebar-empty p{font-size:12px;line-height:1.6;}

/* list panel */
.panel-label{
  font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;
  letter-spacing:.15em;color:var(--muted);margin-bottom:14px;
  padding-bottom:10px;border-bottom:1px solid var(--border);
}
.list-card{
  background:var(--s2);border:1px solid var(--border);border-radius:6px;
  padding:14px;margin-bottom:10px;cursor:pointer;
  transition:border-color .18s,transform .15s;
  position:relative;overflow:hidden;
}
.list-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--cyan);transform:scaleY(0);transition:transform .18s;
}
.list-card:hover{border-color:var(--cyan);transform:translateX(2px);}
.list-card:hover::before{transform:scaleY(1);}
.list-card h3{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text);}
.list-card .sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--cyan);margin-bottom:6px;}
.list-card p{font-size:12px;color:var(--muted);line-height:1.6;}
.cat-pill{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-family:'Space Mono',monospace;font-size:10px;margin-top:8px;font-weight:700;
}

/* detail panel */
.detail-back{
  display:flex;align-items:center;gap:6px;cursor:pointer;
  font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);
  margin-bottom:18px;transition:color .2s;
}
.detail-back:hover{color:var(--cyan);}
.detail-name{font-size:22px;font-weight:800;line-height:1.2;margin-bottom:5px;}
.detail-loc{font-family:'Space Mono',monospace;font-size:11px;color:var(--cyan);margin-bottom:18px;letter-spacing:.04em;}
.detail-row{margin-bottom:16px;}
.detail-row-label{
  font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;
  letter-spacing:.12em;color:var(--muted);margin-bottom:5px;
}
.detail-row-val{font-size:14px;line-height:1.7;color:var(--text);}
.coming-soon{
  background:var(--s2);border:1px dashed var(--border2);border-radius:6px;
  padding:14px;margin-top:8px;
}
.coming-soon .detail-row-label{margin-bottom:6px;}
.coming-soon p{font-size:12px;color:var(--muted);line-height:1.6;}

/* ── BOTTOM STRIP ── */
.bottom{
  height:148px;flex-shrink:0;
  background:var(--s1);border-top:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 20px;gap:16px;overflow:hidden;
}
.pie-wrap{width:120px;height:120px;flex-shrink:0;position:relative;}
#donutChart{width:120px!important;height:120px!important;}

/* pie click label panel */
.pie-label-panel{
  display:flex;flex-direction:column;justify-content:center;
  min-width:220px;gap:6px;padding-left:4px;
}
.pie-label-hint{
  font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
  font-style:italic;
}
.pie-label-cat{font-size:16px;font-weight:800;line-height:1.2;margin-bottom:2px;}
.pie-label-pct{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;}
.pie-cont-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
.pie-cont-name{width:110px;color:var(--text);font-weight:600;}
.pie-cont-count{font-family:'Space Mono',monospace;font-size:10px;}

/* ── LEAFLET CUSTOM BUBBLES ── */
.map-bubble{
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-family:'Barlow',sans-serif;font-weight:800;
  cursor:pointer;transition:transform .15s;color:#04080f;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
.map-bubble:hover{transform:scale(1.12);}
.mb-continent{width:68px;height:68px;font-size:22px;background:var(--cyan);box-shadow:0 0 28px rgba(0,212,255,.6),0 0 56px rgba(0,212,255,.2);border:2px solid rgba(255,255,255,.3);}
.mb-country{width:50px;height:50px;font-size:17px;background:var(--amber);box-shadow:0 0 20px rgba(255,201,71,.55),0 0 40px rgba(255,201,71,.15);border:2px solid rgba(255,255,255,.25);}
.mb-startup{
  width:38px;height:38px;
  color:#04080f;border:2px solid rgba(255,255,255,.2);
  text-align:center;padding:4px;line-height:1.2;
  font-family:'Barlow',sans-serif;font-weight:800;font-size:8px;
  -webkit-font-smoothing:antialiased;
}
</style>
</head>

</div>

const CONT_CENTERS = {'North America':[45,-100],'Europe':[50,15],'Asia':[25,90]};

function groupBy(arr,key){
  return arr.reduce((a,i)=>{const k=i[key]||'?';if(!a[k])a[k]=[];a[k].push(i);return a;},{});
}

// ── STATE ──
let level='world', selCont=null, selCountry=null;
let markers=[], map, donutChart;
let activeFilter=null;

window.addEventListener('load',function(){

  // MAP
  map = L.map('map',{center:[25,10],zoom:2,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);

  // ── ENGLISH CONTINENT LABELS ──
  const LABELS = [
    [54,  -100,  'NORTH AMERICA'],
    [-15, -55,   'SOUTH AMERICA'],
    [50,   20,   'EUROPE'],
    [20,   105,   'ASIA'],
    [-25,  135,  'AUSTRALIA'],
    [5,    25,   'AFRICA'],
    [-75,  0,    'ANTARCTICA'],
  ];
  LABELS.forEach(([lat,lng,name])=>{
    L.marker([lat,lng],{
      icon:L.divIcon({
        className:'',
        html:`<div style="font-family:'Barlow',sans-serif;font-weight:700;font-size:11px;color:rgba(180,210,240,0.45);letter-spacing:.18em;white-space:nowrap;pointer-events:none;text-shadow:0 1px 3px #000">${name}</div>`,
        iconSize:null,
        iconAnchor:[0,0],
      }),
      interactive:false,
      zIndexOffset:-1000,
    }).addTo(map);
  });
  L.control.zoom({position:'bottomright'}).addTo(map);

  drillTo('world');
  buildDonut();
  buildFilterPills();
  map.on('zoomend', renderCityLabels);
});

let cityLabelMarkers=[];
function renderCityLabels(){
  cityLabelMarkers.forEach(m=>map.removeLayer(m));
  cityLabelMarkers=[];
  if(map.getZoom()<5||level!=='country') return;
  const arr=STARTUPS.filter(s=>s.continent===selCont&&s.country===selCountry&&s.lat!==0&&s.lng!==0);
  const seen={};
  arr.forEach(s=>{
    const key=`${s.lat.toFixed(1)},${s.lng.toFixed(1)}`;
    if(seen[key]) return; seen[key]=true;
    const lbl=s.city!=='Unknown'?s.city:s.country;
    const m=L.marker([s.lat,s.lng],{
      icon:L.divIcon({
        className:'',
        html:`<div style="font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;color:rgba(200,230,255,0.55);white-space:nowrap;pointer-events:none;text-shadow:0 1px 4px #000;margin-top:20px;margin-left:4px">${lbl}</div>`,
        iconSize:null,iconAnchor:[0,0],
      }),interactive:false,zIndexOffset:-500,
    }).addTo(map);
    cityLabelMarkers.push(m);
  });
}

// ── DRILL ──
function drillTo(lvl,cont,country){
  level=lvl; selCont=cont||null; selCountry=country||null;
  clearMarkers(); updateBC();
  if(lvl==='world'){
    renderWorld(); map.flyTo([25,10],2,{duration:1});
    document.getElementById('mapHint').textContent='Click a bubble to explore the portfolio';
    showSidebarList();
  } else if(lvl==='continent'){
    renderContinent(cont);
    const c=CONT_CENTERS[cont]||[25,10];
    map.flyTo(c,cont==='Europe'?4:3,{duration:1});
    document.getElementById('mapHint').textContent='Click a country to zoom in';
    showSidebarContinent(cont);
  } else if(lvl==='country'){
    renderCountry(cont,country);
    const pts=filtered().filter(s=>s.continent===cont&&s.country===country&&s.lat!==0&&s.lng!==0);
    if(pts.length){
      const lats=pts.map(s=>s.lat),lngs=pts.map(s=>s.lng);
      map.flyToBounds([[Math.min(...lats)-1.5,Math.min(...lngs)-1.5],[Math.max(...lats)+1.5,Math.max(...lngs)+1.5]],{padding:[50,50],duration:1});
    }
    document.getElementById('mapHint').textContent='Click a startup to view details';
    showSidebarCountry(cont,country);
  }
}
window.drillTo=drillTo;

function filtered(){
  if(!activeFilter) return STARTUPS;
  return STARTUPS.filter(s=>s.category===activeFilter);
}

function clearMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[];}

function mkIcon(cls,label){
  return L.divIcon({className:'',html:`<div class="map-bubble ${cls}">${label}</div>`,iconSize:null,
    iconAnchor:cls==='mb-continent'?[34,34]:cls==='mb-country'?[25,25]:[19,19]});
}

function renderWorld(){
  const bc=groupBy(filtered().filter(s=>s.continent!=='Unknown'),'continent');
  Object.entries(bc).forEach(([c,arr])=>{
    const ctr=CONT_CENTERS[c];if(!ctr)return;
    const m=L.marker(ctr,{icon:mkIcon('mb-continent',arr.length)}).addTo(map);
    m.on('click',()=>drillTo('continent',c));
    markers.push(m);
  });
}

function renderContinent(cont){
  const arr=filtered().filter(s=>s.continent===cont);
  Object.entries(groupBy(arr,'country')).forEach(([country,ca])=>{
    const valid=ca.filter(s=>s.lat!==0&&s.lng!==0);
    if(!valid.length)return;
    const lat=valid.reduce((a,b)=>a+b.lat,0)/valid.length;
    const lng=valid.reduce((a,b)=>a+b.lng,0)/valid.length;
    const m=L.marker([lat,lng],{icon:mkIcon('mb-country',ca.length)}).addTo(map);
    m.on('click',()=>drillTo('country',cont,country));
    markers.push(m);
  });
}

function renderCountry(cont,country){
  const arr=filtered().filter(s=>s.continent===cont&&s.country===country);
  const seen={};
  arr.forEach(s=>{
    const key=`${s.lat},${s.lng}`;
    if(!seen[key])seen[key]=0;
    const idx=seen[key]++;
    const jLat=s.lat+(idx>0?idx*0.14*Math.cos(idx*1.5):0);
    const jLng=s.lng+(idx>0?idx*0.14*Math.sin(idx*1.5):0);
    const lbl=s.name.length>10?s.name.slice(0,9)+'…':s.name;
    const div=document.createElement('div');
    div.className='map-bubble mb-startup';
    div.style.background=s.cat_color;
    div.textContent=lbl;
    const icon=L.divIcon({className:'',html:div.outerHTML,iconSize:null,iconAnchor:[17,17]});
    const m=L.marker([jLat,jLng],{icon}).addTo(map);
    m.on('click',()=>showDetail(s));
    markers.push(m);
  });
}

// ── BREADCRUMB ──
function updateBC(){
  let h=`<span class="bc-crumb" onclick="drillTo('world')">World</span>`;
  if(selCont) h+=`<span class="bc-sep">›</span><span class="bc-crumb" onclick="drillTo('continent','${selCont}')">${selCont}</span>`;
  if(selCountry) h+=`<span class="bc-sep">›</span><span class="bc-current">${selCountry}</span>`;
  document.getElementById('bc').innerHTML=h;
}

// ── SIDEBAR ──
function setSidebar(html){document.getElementById('sidebarInner').innerHTML=html;}

function showSidebarList(){
  setSidebar(`<div class="sidebar-empty"><div class="empty-icon">◎</div><p>Click a continent bubble on the map to start exploring.</p></div>`);
}

function showSidebarContinent(cont){
  const arr=filtered().filter(s=>s.continent===cont);
  const bc=groupBy(arr,'country');
  const sorted=Object.entries(bc).sort((a,b)=>b[1].length-a[1].length);
  let h=`<div class="panel-label">${cont} — ${arr.length} companies</div>`;
  h+=sorted.map(([c,ca])=>`
    <div class="list-card" onclick="drillTo('country','${cont}','${c.replace(/'/g,"\\'")}')">
      <h3>${c}</h3>
      <div class="sub">${ca.length} startup${ca.length>1?'s':''}</div>
    </div>`).join('');
  setSidebar(h);
}

function showSidebarCountry(cont,country){
  const arr=filtered().filter(s=>s.continent===cont&&s.country===country);
  let h=`<div class="panel-label">${country} — ${arr.length} startup${arr.length>1?'s':''}</div>`;
  h+=arr.map(s=>`
    <div class="list-card" onclick="showDetailById(${s.id})">
      <h3>${s.name}</h3>
      <div class="sub">${s.city!=='Unknown'?s.city+(s.state?', '+s.state:''):country}</div>
      <p>${s.summary||'—'}</p>
      <span class="cat-pill" style="background:${s.cat_color}22;color:${s.cat_color};border:1px solid ${s.cat_color}44">${s.category}</span>
    </div>`).join('');
  setSidebar(h);
}

function showDetailById(id){showDetail(STARTUPS.find(s=>s.id===id));}
window.showDetailById=showDetailById;

function showDetail(s){
  const loc=[s.city!=='Unknown'?s.city:'',s.state,s.country].filter(Boolean).join(', ');
  const backLevel=selCountry?'country':selCont?'continent':'world';
  const backLabel=selCountry?selCountry:selCont?selCont:'World';
  const backArgs=selCountry?`'country','${selCont}','${selCountry}'`:selCont?`'continent','${selCont}'`:`'world'`;
  setSidebar(`
    <div class="detail-back" onclick="drillTo(${backArgs})">← ${backLabel}</div>
    <div class="detail-name">${s.name}</div>
    <div class="detail-loc">📍 ${loc}</div>
    <div class="detail-row">
      <div class="detail-row-label">Category</div>
      <span class="cat-pill" style="background:${s.cat_color}22;color:${s.cat_color};border:1px solid ${s.cat_color}55;font-size:11px;padding:3px 10px">${s.category}</span>
    </div>
    <div class="detail-row">
      <div class="detail-row-label">What They Do</div>
      <div class="detail-row-val">${s.summary||'No summary available.'}</div>
    </div>
    <div class="detail-row">
      <div class="detail-row-label">Region</div>
      <div class="detail-row-val">${s.continent} · ${s.country}${s.state?' · '+s.state:''}</div>
    </div>
    <div class="coming-soon">
      <div class="detail-row-label">💡 Funding & News</div>
      <p>Add funding_stage, amount_raised, founded_year, and latest_news columns to your spreadsheet to unlock this section.</p>
    </div>`);
}

// ── PIE CHART ──
function buildDonut(){
  const counts={};
  STARTUPS.forEach(s=>{counts[s.category]=(counts[s.category]||0)+1;});
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const labels=sorted.map(x=>x[0]);
  const data=sorted.map(x=>x[1]);
  const colors=sorted.map(x=>STARTUPS.find(s=>s.category===x[0]).cat_color);
  const total=STARTUPS.length;

  const ctx=document.getElementById('donutChart').getContext('2d');
  donutChart=new Chart(ctx,{
    type:'pie',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#04080f',hoverOffset:6}]},
    options:{
      cutout:0,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      animation:{duration:1000},
      onClick:(e,els)=>{
        const panel=document.getElementById('pieLabelPanel');
        if(els.length){
          const i=els[0].index;
          const pct=Math.round(data[i]/total*100);
          // count per continent for this category
          const catStartups=STARTUPS.filter(s=>s.category===labels[i]&&s.continent!=='Unknown');
          const contCounts={};
          catStartups.forEach(s=>{contCounts[s.continent]=(contCounts[s.continent]||0)+1;});
          const contRows=Object.entries(contCounts).sort((a,b)=>b[1]-a[1])
            .map(([c,n])=>`<div class="pie-cont-row"><span class="pie-cont-name">${c}</span><span class="pie-cont-count">${n} startup${n>1?'s':''}</span></div>`)
            .join('');
          panel.innerHTML=`
            <div class="pie-label-cat" style="color:${colors[i]}">${labels[i]}</div>
            <div class="pie-label-pct" style="color:${colors[i]}">${pct}%</div>
            ${contRows}`;
        } else {
          panel.innerHTML=`<div class="pie-label-hint">Click a slice to explore</div>`;
        }
      },
      onHover:(e,els)=>{
        e.native.target.style.cursor=els.length?'pointer':'default';
      }
    }
  });
}
